  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/auth.css">

  <!-- Supabase client (UMD) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
  window.supabaseClient = window.supabase.createClient(
    'https://dfgqqjwknctmwrodcsnb.supabase.co',

<body>
  <div class="auth-page">
    <div class="auth-bg-circle auth-bg-circle--top-right"></div>
    <div class="auth-bg-circle auth-bg-circle--bottom-left"></div>

    <header class="auth-header">
      <img src="assets/images/logo.png" alt="Mabun Quiz" class="auth-logo">
    </header>

    <main class="auth-main">
      <h1 class="auth-title">Login</h1>
      <p class="auth-subtitle">Enter your email and password</p>

      <form class="auth-form" id="loginForm">
        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <iconify-icon icon="solar:letter-linear" class="input-icon"></iconify-icon>
            <input type="email" id="email" class="input-field" placeholder="your@email.com" required>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-wrapper">
            <iconify-icon icon="solar:lock-keyhole-linear" class="input-icon"></iconify-icon>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <iconify-icon icon="solar:eye-closed-linear"></iconify-icon>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Log In
          <iconify-icon icon="solar:arrow-right-bold"></iconify-icon>
        </button>
      </form>

      <div class="auth-links">
        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
        <span class="separator">•</span>
        <a href="register.html" class="auth-link">Create account</a>
      </div>
    </main>
  </div>

  <script type="module" src="js/features/login.js"></script>
  <script type="module" src="js/utils/password-toggle.js"></script>
</body>
</html>
