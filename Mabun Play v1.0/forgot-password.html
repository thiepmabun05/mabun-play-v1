<body>
  <div class="auth-page">
    <div class="auth-bg-circle auth-bg-circle--top-right"></div>
    <div class="auth-bg-circle auth-bg-circle--bottom-left"></div>

    <header class="auth-header">
      <a href="login.html" class="back-btn">
        <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
      </a>
      <img src="assets/images/logo.png" alt="Mabun Quiz" class="auth-logo">
    </header>

    <main class="auth-main">
      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-subtitle">Enter your phone number to reset your password</p>

      <form class="auth-form" id="forgotForm">
        <div class="form-group">
          <label for="phone" class="form-label">Phone Number</label>
          <div class="input-wrapper">
            <span class="input-prefix">+211</span>
            <input type="tel" id="phone" class="input-field" 
                   placeholder="9XX XXX XXX" pattern="^(9[28]\d{7})$" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Send Reset Code
          <iconify-icon icon="solar:plain-bold"></iconify-icon>
        </button>
      </form>

      <p class="auth-footer-text">
        Remember your password?
        <a href="login.html" class="auth-link">Log in</a>
      </p>
    </main>
  </div>
