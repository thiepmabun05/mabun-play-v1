<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mabun Quiz – Change Password</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/iconify-icon/2.2.0/iconify-icon.min.js"></script>

  <link rel="stylesheet" href="css/main.css">
  <style>
    .bottom-spacer { height: 120px; }
    .change-password-container {
      max-width: 500px;
      margin: var(--space-l) auto;
      padding: var(--space-l);
    }
    .form-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-md);
    }
    .form-title {
      margin-bottom: var(--space-l);
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
    }
    .form-actions {
      display: flex;
      gap: var(--space-m);
      margin-top: var(--space-xl);
    }
    .btn-full {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar Navigation -->
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <iconify-icon icon="solar:home-smile-bold" class="nav-icon"></iconify-icon>
        <span>Home</span>
      </a>
      <a href="community.html" class="nav-item">
        <iconify-icon icon="solar:users-group-rounded-outline" class="nav-icon"></iconify-icon>
        <span>Community</span>
      </a>
      <a href="leaderboard.html" class="nav-item">
        <iconify-icon icon="solar:cup-linear" class="nav-icon"></iconify-icon>
        <span>Rank</span>
      </a>
      <a href="wallet.html" class="nav-item">
        <iconify-icon icon="solar:wallet-linear" class="nav-icon"></iconify-icon>
        <span>Wallet</span>
      </a>
      <a href="profile.html" class="nav-item">
        <iconify-icon icon="solar:user-rounded-linear" class="nav-icon"></iconify-icon>
        <span>Profile</span>
      </a>
      <a href="settings.html" class="nav-item">
        <iconify-icon icon="solar:settings-outline" class="nav-icon"></iconify-icon>
        <span>Settings</span>
      </a>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="app-bar">
        <div class="app-bar-left">
          <a href="settings.html" class="back-btn">
            <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
          </a>
        </div>
        <h1 class="app-bar-title">Change Password</h1>
        <div class="app-bar-right">
          <a href="notifications.html" class="notification-btn" aria-label="Notifications">
            <iconify-icon icon="solar:bell-linear"></iconify-icon>
            <span class="notification-dot"></span>
          </a>
          <a href="profile.html" class="profile-avatar" aria-label="Profile">
            <iconify-icon icon="solar:user-circle-linear"></iconify-icon>
          </a>
        </div>
      </header>

      <!-- Change Password Form -->
      <div class="change-password-container">
        <div class="form-card">
          <h2 class="form-title">Change Your Password</h2>
          <form id="changePasswordForm">
            <div class="form-group">
              <label for="currentPassword" class="form-label">Current Password</label>
              <div class="input-wrapper">
                <iconify-icon icon="solar:lock-keyhole-linear" class="input-icon"></iconify-icon>
                <input type="password" id="currentPassword" class="input-field" placeholder="••••••••" required>
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <iconify-icon icon="solar:eye-closed-linear"></iconify-icon>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="newPassword" class="form-label">New Password</label>
              <div class="input-wrapper">
                <iconify-icon icon="solar:lock-keyhole-linear" class="input-icon"></iconify-icon>
                <input type="password" id="newPassword" class="input-field" placeholder="Min. 6 characters" required>
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <iconify-icon icon="solar:eye-closed-linear"></iconify-icon>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword" class="form-label">Confirm New Password</label>
              <div class="input-wrapper">
                <iconify-icon icon="solar:lock-keyhole-linear" class="input-icon"></iconify-icon>
                <input type="password" id="confirmPassword" class="input-field" placeholder="Re-enter new password" required>
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                  <iconify-icon icon="solar:eye-closed-linear"></iconify-icon>
                </button>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-outline btn-full" onclick="window.location.href='settings.html'">Cancel</button>
              <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                Update Password
                <iconify-icon icon="solar:check-circle-bold"></iconify-icon>
              </button>
            </div>
          </form>
        </div>
        <div class="bottom-spacer"></div>
      </div>
    </main>
  </div>

  <script type="module" src="js/core/app.js"></script>
  <script type="module" src="js/features/change-password.js"></script>
  <script type="module" src="js/utils/password-toggle.js"></script>
</body>
</html>
