<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mabun Quiz – Deposit</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Iconify Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.2.0/iconify-icon.min.js"></script>

  <!-- Core Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/pages/wallet.css">
  <link rel="stylesheet" href="css/pages/transaction.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar Navigation (same as wallet) -->
       <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <iconify-icon icon="solar:home-smile-bold" class="nav-icon"></iconify-icon>
        <span>Home</span>
      </a>
     <a href="community.html" class="nav-item">
  <iconify-icon icon="solar:users-group-rounded-outline" class="nav-icon"></iconify-icon>
  <span>Community</span>
</a>
      <a href="leaderboard.html" class="nav-item">
        <iconify-icon icon="solar:cup-linear" class="nav-icon"></iconify-icon>
        <span>Rank</span>
      </a>
      <a href="wallet.html" class="nav-item">
        <iconify-icon icon="solar:wallet-linear" class="nav-icon"></iconify-icon>
        <span>Wallet</span>
      </a>
      <a href="profile.html" class="nav-item">
        <iconify-icon icon="solar:user-rounded-linear" class="nav-icon"></iconify-icon>
        <span>Profile</span>
      </a>
      <a href="settings.html" class="nav-item">
  <iconify-icon icon="solar:settings-outline" class="nav-icon"></iconify-icon>
  <span>Settings</span>
</a>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="app-bar">
        <div class="app-bar-left">
          <a href="wallet.html" class="back-btn">
            <iconify-icon icon="solar:arrow-left-linear"></iconify-icon>
          </a>
        </div>
        <h1 class="app-bar-title">Deposit Funds</h1>
        <div class="app-bar-right">
          <a href="notifications.html" class="notification-btn" aria-label="Notifications">
            <iconify-icon icon="solar:bell-linear"></iconify-icon>
            <span class="notification-dot"></span>
          </a>
          <a href="profile.html" class="profile-avatar" aria-label="Profile">
            <iconify-icon icon="solar:user-circle-linear"></iconify-icon>
          </a>
        </div>
      </header>

      <!-- Deposit Form -->
      <div class="transaction-container">
        <div class="form-card">
          <h2 class="form-title">Add money to your wallet</h2>

          <form id="depositForm">
            <!-- Amount Field -->
            <div class="form-group">
              <label for="amount" class="form-label">Amount (SSP)</label>
              <div class="amount-input-wrapper">
                <input type="number" id="amount" name="amount" class="form-input"
                       placeholder="Enter amount" min="100" max="50000000" step="100" required>
                <span class="currency-symbol">SSP</span>
              </div>
              <div class="form-hint">Min: 100 SSP, Max: 50,000,000 SSP</div>
            </div>

            <!-- Payment Method -->
            <div class="form-group">
              <label for="paymentMethod" class="form-label">Payment Method</label>
              <select id="paymentMethod" name="paymentMethod" class="form-select" required>
                <option value="" disabled selected>Select payment method</option>
                <option value="credit_card">MPay</option>
                <option value="mobile_money">Mobile Money</option>
                 
              </select>
            </div>

            <!-- Form Actions -->
            <div class="form-actions">
              <button type="button" class="btn btn-outline" onclick="window.location.href='wallet.html'">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary" id="submitBtn">
                <iconify-icon icon="solar:card-recive-bold"></iconify-icon>
                Deposit
              </button>
            </div>
          </form>
        </div>

        <!-- Quick deposit suggestions -->
        <div class="quick-amounts">
          <button class="quick-amount-btn" data-amount="1000">1,000 SSP</button>
          <button class="quick-amount-btn" data-amount="5000">5,000 SSP</button>
          <button class="quick-amount-btn" data-amount="10000">10,000 SSP</button>
          <button class="quick-amount-btn" data-amount="50000">50,000 SSP</button>
        </div>

        <!-- Bottom Spacer (ensures content clears navigation) -->
        <div class="bottom-spacer"></div>
      </div>
    </main>
  </div>

    <!-- Core app script -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="js/core/app.js"></script>
  <script type="module" src="js/features/deposit.js"></script>
</body>
</html>
