        <h1 class="app-bar-title">Quiz Results</h1>
        <div class="app-bar-right">

      <!-- Results Content -->
      <div class="results-container">

        <!-- Result Card -->
        <div class="result-card">
          <div class="result-header">
            <h2 class="result-quiz-title" id="resultQuizTitle">—</h2>
            <span class="result-badge" id="resultBadge">—</span>
          </div>

          <div class="result-score-circle">
            <svg viewBox="0 0 120 120" class="score-svg">
              <circle class="score-bg" cx="60" cy="60" r="54" fill="none" stroke="var(--border)" stroke-width="8"></circle>
              <circle class="score-progress" cx="60" cy="60" r="54" fill="none" stroke="var(--primary)" stroke-width="8" stroke-linecap="round" stroke-dasharray="339.3" stroke-dashoffset="0" transform="rotate(-90 60 60)"></circle>
            </svg>
            <div class="score-text">
              <span class="score-percentage" id="scorePercentage">—</span>
              <span class="score-points" id="scorePoints">—</span>
            </div>
          </div>

          <div class="result-stats">
            <div class="stat-item">
              <span class="stat-label">Correct</span>
              <span class="stat-value correct" id="correctCount">—</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Incorrect</span>
              <span class="stat-value incorrect" id="incorrectCount">—</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Earnings</span>
              <span class="stat-value earnings" id="earnings">—</span>
            </div>
          </div>

          <div class="result-actions">
            <a href="leaderboard.html" class="btn btn-outline">View Leaderboard</a>
          </div>
        </div>

        <!-- Top Players Preview -->
        <div class="top-players-card">
          <h3 class="top-players-title">Top Players</h3>
          <div class="top-players-list" id="topPlayersList"></div>
          <a href="leaderboard.html" class="view-full-link">View Full Leaderboard</a>
        </div>

        <!-- Bottom Spacer -->
        <div class="bottom-spacer"></div>

      </div>
